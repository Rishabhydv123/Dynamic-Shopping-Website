<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="../Css/web.css">
</head>

<body>

<nav class="navbar">
<h2 class="logo">Dynamic Shopping Website</h2>
<a href="index.html" class="cart-link">Back to Shop</a>
</nav>

<section class="cart-section">
<h2>Your Cart</h2>
<div id="cartContainer"></div>

<div class="cart-summary">
<h3>Subtotal: ₹<span id="cartTotal">0</span></h3>
<h3>GST (18%): ₹<span id="gstAmount">0</span></h3>
<h3>Delivery Charge: ₹<span id="deliveryCharge">50</span></h3>
<h3>Discount: -₹<span id="discountAmount">0</span></h3>
<hr>
<h2>Total Amount: ₹<span id="finalTotal">0</span></h2>
<button onclick="checkout()">Proceed to Checkout</button>
</div>
</section>

<script src="../JavaScript/cart.js"></script>

</body>
</html>
